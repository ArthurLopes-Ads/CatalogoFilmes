<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Catalogo de filmes</title>
  </head>

  <body class="pagina-inicial">
    <header class="cabecalho">
      <img class="logo-header" src="logo.png" alt="Logo" />
      <nav class="navegacao">
        <a class="link-navegacao">Comunidade</a>
        <a class="link-navegacao">Tutorial</a>
        <a class="link-navegacao">Sobre</a>
      </nav>
    </header>

    <main class="conteudo">
      <section class="sessao-banner">
        <div class="banner-texto">
          <h1 class="banner-texto-titulo">Catálogo de filmes</h1>
          <h2 class="banner-texto-subtitulo">
            Encontre o filme que você procura
          </h2>
          <button class="botao-buscar">Buscar</button>
        </div>
        <img class="banner" src="banner.png" alt="Banner" />
      </section>

      <section class="sessao-destaque">
        <h3 class="destaque">Filmes em destaque</h3>
      </section>
    </main>

    <footer class="rodape">
      <img class="logo-footer" src="logo.png" alt="Logo-footer" />
      <p class="copyright">
        © 2026 Catálogo de Filmes. Todos os direitos reservados.
      </p>
    </footer>
  </body>
</html>
